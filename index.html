<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturday Reset</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div>
        <h1>Goals</h1>
        <textarea id="goals"></textarea>
        <h1>Rating</h1>
        <input type="number" id="rating" min="1" max="5">
    </div>

    <script>
        // Load saved state from localStorage on page load
        document.addEventListener('DOMContentLoaded', () => {
            const savedGoals = localStorage.getItem('goals');
            const savedRating = localStorage.getItem('rating');
            if (savedGoals) {
                document.getElementById('goals').value = savedGoals;
            }
            if (savedRating) {
                document.getElementById('rating').value = savedRating;
            }
        });

        // Save state to localStorage on every change
        document.getElementById('goals').addEventListener('input', (event) => {
            localStorage.setItem('goals', event.target.value);
        });

        document.getElementById('rating').addEventListener('input', (event) => {
            localStorage.setItem('rating', event.target.value);
        });
    </script>
</body>
</html>
