
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.dr{--bg:#0f0f11;--bg2:#18181c;--bg3:#222228;--bd:#333340;--bd2:#444455;--t1:#f5f4ff;--t2:#c4c3d8;--t3:#7a7990;--acc:#7b72e8;--star:#d4a84b;--prog:#534AB7;--warm:#e8a87c}
.dr{background:var(--bg);min-height:100vh;padding:2.5rem 1rem 3rem;font-family:'DM Sans',sans-serif;color:var(--t1)}
.app{max-width:560px;margin:0 auto}
.header{text-align:center;margin-bottom:2.5rem}
.eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--t3);margin-bottom:.6rem}
.htitle{font-family:'Playfair Display',Georgia,serif;font-size:52px;font-weight:400;line-height:1.1;color:var(--t1)}
.htitle em{font-style:italic;color:var(--warm)}
.section{background:var(--bg2);border:0.5px solid var(--bd);border-radius:12px;padding:1.35rem 1.5rem;margin-bottom:1rem}
.slabel{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:1.1rem}
.stars-row{display:flex;flex-direction:column;align-items:center;gap:10px}
.stars-btns{display:flex;gap:14px;justify-content:center;align-items:center}
.star-btn{background:none;border:none;cursor:pointer;padding:4px;line-height:1;transition:transform .1s ease;color:var(--bd2)}
.star-btn:hover{transform:scale(1.12)}
.star-btn.filled svg path{fill:var(--star)}
.star-btn svg{display:block}
.star-caption{font-size:15px;color:var(--t2);font-style:italic;font-family:'Playfair Display',serif;min-height:22px;text-align:center}
.goals-list{display:flex;flex-direction:column;gap:0}
.goal-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:.5px solid var(--bd)}
.goal-item:last-child{border-bottom:none}
.goal-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.goal-text{font-size:14px;color:var(--t1);flex:1;background:none;border:none;outline:none;font-family:'DM Sans',sans-serif;font-weight:400;cursor:text}
.goal-text.done{text-decoration:line-through;color:var(--t3)}
.goal-delete{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:0 2px;opacity:0;transition:opacity .15s;line-height:1}
.goal-item:hover .goal-delete{opacity:1}
.add-goal{display:flex;align-items:center;gap:10px;padding:10px 0 0;margin-top:4px}
.add-goal input{flex:1;font-size:13px;font-family:'DM Sans',sans-serif;background:none;border:none;border-bottom:.5px solid var(--bd2);outline:none;padding:4px 0;color:var(--t2)}
.add-goal input::placeholder{color:var(--t3)}
.add-btn{font-size:20px;background:none;border:.5px solid var(--bd2);color:var(--t2);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .1s,color .1s}
.add-btn:hover{background:var(--bg3);color:var(--t1)}
.progress-bar-wrap{height:3px;background:var(--bg3);border-radius:99px;margin-top:14px;overflow:hidden}
.progress-bar{height:100%;background:var(--prog);border-radius:99px;transition:width .3s ease}
.progress-label{font-size:11px;color:var(--t3);text-align:right;margin-top:4px}
.section-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.section-actions .slabel{margin-bottom:0}
.move-btn{font-size:11px;letter-spacing:.04em;background:none;border:.5px solid var(--bd2);color:var(--t3);border-radius:6px;padding:4px 10px;cursor:pointer;transition:background .15s,color .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;display:flex;align-items:center;gap:5px}
.move-btn:hover{background:var(--bg3);color:var(--t1)}
.move-btn svg{flex-shrink:0}
</style>
<div class="dr">
<div class="app">
  <div class="header">
    <div class="eyebrow">Weekly ritual</div>
    <div class="htitle"><em>Saturday</em> Reset</div>
  </div>

  <div class="section">
    <div class="slabel" style="text-align:center;margin-bottom:.9rem">How was your week?</div>
    <div class="stars-row">
      <div class="stars-btns">
        <button class="star-btn" data-i="1" onclick="rate(1)"><svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
        <button class="star-btn" data-i="2" onclick="rate(2)"><svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
        <button class="star-btn" data-i="3" onclick="rate(3)"><svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
        <button class="star-btn" data-i="4" onclick="rate(4)"><svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
        <button class="star-btn" data-i="5" onclick="rate(5)"><svg width="40" height="40" viewBox="0 0 24 24"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l7.1-1.01z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg></button>
      </div>
      <div class="star-caption" id="rating-label">Tap to rate</div>
    </div>
  </div>

  <div class="section">
    <div class="slabel">This week's goals</div>
    <div class="goals-list" id="this-week-list"></div>
    <div class="add-goal">
      <input type="text" id="this-week-input" placeholder="Add a goal..." onkeydown="addGoalKey(event,'this')" />
      <button class="add-btn" onclick="addGoal('this')">+</button>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="this-week-bar" style="width:0%"></div></div>
    <div class="progress-label" id="this-week-prog"></div>
  </div>

  <div class="section">
    <div class="section-actions">
      <div class="slabel">Next week's goals</div>
      <button class="move-btn" onclick="moveNextToThis()">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="10" x2="6" y2="2"/><polyline points="2,5 6,1 10,5"/></svg>
        Move all to this week
      </button>
    </div>
    <div class="goals-list" id="next-week-list"></div>
    <div class="add-goal">
      <input type="text" id="next-week-input" placeholder="Add a goal..." onkeydown="addGoalKey(event,'next')" />
      <button class="add-btn" onclick="addGoal('next')">+</button>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="next-week-bar" style="width:0%"></div></div>
    <div class="progress-label" id="next-week-prog"></div>
  </div>
</div>
</div>

<script>
const labels=['','Rough week','It was okay','Pretty good','Great week','Amazing week!'];
let rating=0;
const state={this:[],next:[]};
function rate(n){
  rating=n;
  document.querySelectorAll('.star-btn').forEach(b=>{
    const filled=parseInt(b.dataset.i)<=n;
    const path=b.querySelector('path');
    path.setAttribute('fill', filled ? 'var(--star)' : 'none');
    path.setAttribute('stroke', filled ? 'var(--star)' : 'currentColor');
  });
  document.getElementById('rating-label').textContent=labels[n];
}
function renderGoals(which){
  const list=document.getElementById(which+'-week-list');
  list.innerHTML='';
  state[which].forEach((g,i)=>{
    const row=document.createElement('div');
    row.className='goal-item';
    const cb=document.createElement('input');
    cb.type='checkbox';cb.checked=g.done;
    const inp=document.createElement('input');
    inp.type='text';inp.className='goal-text'+(g.done?' done':'');inp.value=g.text;
    cb.onchange=()=>{state[which][i].done=cb.checked;inp.classList.toggle('done',cb.checked);updateProgress(which)};
    inp.oninput=()=>{state[which][i].text=inp.value};
    const del=document.createElement('button');del.className='goal-delete';del.textContent='x';
    del.onclick=()=>{state[which].splice(i,1);renderGoals(which);updateProgress(which)};
    row.appendChild(cb);row.appendChild(inp);row.appendChild(del);
    list.appendChild(row);
  });
  updateProgress(which);
}
function updateProgress(which){
  const goals=state[which];
  const done=goals.filter(g=>g.done).length;
  const total=goals.length;
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById(which+'-week-bar').style.width=pct+'%';
  document.getElementById(which+'-week-prog').textContent=total?done+' of '+total+' complete':'';
}
function addGoal(which){
  const inp=document.getElementById(which+'-week-input');
  const val=inp.value.trim();
  if(!val)return;
  state[which].push({text:val,done:false});
  inp.value='';
  renderGoals(which);
}
function addGoalKey(e,which){if(e.key==='Enter')addGoal(which)}
function moveNextToThis(){
  if(!state.next.length)return;
  state.next.forEach(g=>state.this.push({text:g.text,done:false}));
  state.next=[];
  renderGoals('this');
  renderGoals('next');
}
renderGoals('this');
renderGoals('next');
</script>
