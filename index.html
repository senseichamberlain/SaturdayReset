<script>
    // Function to save goals and rating data to local storage
    function saveState() {
        const goals = document.querySelector('#goals').value;
        const rating = document.querySelector('#rating').value;
        localStorage.setItem('goals', goals);
        localStorage.setItem('rating', rating);
    }

    // Function to load goals and rating data from local storage
    function loadState() {
        const savedGoals = localStorage.getItem('goals');
        const savedRating = localStorage.getItem('rating');
        if (savedGoals) {
            document.querySelector('#goals').value = savedGoals;
        }
        if (savedRating) {
            document.querySelector('#rating').value = savedRating;
        }
    }

    // Load state on page load
    window.onload = loadState;

    // Event listeners to save the state when goals or rating are modified
    document.querySelector('#goals').addEventListener('change', saveState);
    document.querySelector('#rating').addEventListener('change', saveState);
</script>
