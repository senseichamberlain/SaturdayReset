<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturday Reset</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        h1 { color: #333; }
        input[type='text'] { width: 100%; padding: 10px; margin: 5px 0; } 
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        .goal { margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Saturday Reset</h1>
    <input type="text" id="goalInput" placeholder="Enter your goal">
    <button id="addGoalBtn">Add Goal</button>
    <div id="goalList"></div>
    <script>
        let goals = [];
        let ratings = [];

        function saveState() {
            localStorage.setItem('goals', JSON.stringify(goals));
            localStorage.setItem('ratings', JSON.stringify(ratings));
        }

        function loadState() {
            const savedGoals = localStorage.getItem('goals');
            const savedRatings = localStorage.getItem('ratings');
            if (savedGoals) {
                goals = JSON.parse(savedGoals);
            }
            if (savedRatings) {
                ratings = JSON.parse(savedRatings);
            }
            renderGoals();
        }

        function renderGoals() {
            const goalList = document.getElementById('goalList');
            goalList.innerHTML = '';
            goals.forEach((goal, index) => {
                const goalDiv = document.createElement('div');
                goalDiv.className = 'goal';
                goalDiv.innerHTML = `${goal} <button onclick="deleteGoal(${index})">Delete</button>`;
                goalList.appendChild(goalDiv);
            });
        }

        function addGoal() {
            const goalInput = document.getElementById('goalInput');
            if (goalInput.value) {
                goals.push(goalInput.value);
                ratings.push(0);
                goalInput.value = '';
                renderGoals();
                saveState();
            }
        }

        function deleteGoal(index) {
            goals.splice(index, 1);
            ratings.splice(index, 1);
            renderGoals();
            saveState();
        }

        document.getElementById('addGoalBtn').addEventListener('click', addGoal);

        loadState();
    </script>
</body>
</html>
